      pathOverride: ""
    publishStatusAddress: ""
    defaultBackendService: ""
    disableSvcExternalName: false
    throttleDuration: ""
    certAuthFilePath: ""
    endpoint: ""
    token: ""

  knative:
    enabled: false
    namespaces: []
    labelSelector: ""

volumes: []

