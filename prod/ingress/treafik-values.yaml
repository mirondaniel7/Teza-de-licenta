global:
  checkNewVersion: true
  sendAnonymousUsage: false
  azure:
    enabled: false
    images:
      proxy:
        image: traefik
        tag: latest
        registry: docker.io/library
      hub:
        image: traefik-hub
        tag: latest
        registry: ghcr.io/traefik

# <-- CHANGED: убираем сломанную подстановку ${printenv $NODE_NAME} —
# entrypoints.web/websecure.address задаёт wrapper-скрипт в command через kustomize-patch в ArgoCD Application.
additionalArguments: []

# <-- CHANGED: оставляем только NODE_NAME, удалены невалидные env-переменные cdp-worker-* (имена env нельзя с дефисами)
env:
  - name: NODE_NAME
    valueFrom:
      fieldRef:
        fieldPath: spec.nodeName

envFrom: []

ports:
  traefik:
    port: 8080
    hostPort: null
    hostIP:
    expose:
      default: false
    exposedPort: 8080
    protocol: TCP
    observability:
      metrics:
      accessLogs:
      tracing:
      traceVerbosity:
  web:
    asDefault:
    # <-- CHANGED: port = hostPort при hostNetwork=true, поэтому 80 а не 8000.
    # securityContext.capabilities.add NET_BIND_SERVICE уже есть, так что
    # привилегированные порты работают.
    port: 80
    expose:
      default: true
    exposedPort: 80
    targetPort:
    protocol: TCP
    nodePort:
    http:
      redirections:
        entryPoint: 
          to: websecure
          scheme: https
          permanent: true
    forwardedHeaders:
      trustedIPs: []
      insecure: false
    proxyProtocol:
      trustedIPs: []
      insecure: false
    transport:
      respondingTimeouts:
        readTimeout:
        writeTimeout:
        idleTimeout:
      lifeCycle:
        requestAcceptGraceTimeout:
        graceTimeOut:
      keepAliveMaxRequests:
      keepAliveMaxTime:
    observability:
      metrics:
      accessLogs:
      tracing:
      traceVerbosity:
  websecure:
    # <-- CHANGED: 443 вместо 8443 по той же причине (hostNetwork).
    port: 443
    hostPort: null
    containerPort:
    expose:
      default: true
    exposedPort: 443
    targetPort:
    protocol: TCP
    nodePort:
    appProtocol:
    allowACMEByPass: false
    http:
      encodedCharacters:
        allowEncodedSlash:
        allowEncodedBackSlash:
        allowEncodedNullCharacter:
        allowEncodedSemicolon:
        allowEncodedPercent:
        allowEncodedQuestionMark:
        allowEncodedHash:
      maxHeaderBytes:
      middlewares: []
      sanitizePath:
      tls:
        enabled: true
        options: ""
        certResolver: ""
        domains: []
    http3:
      enabled: false
      advertisedPort:
    forwardedHeaders:
      trustedIPs: []
      insecure: false
    proxyProtocol:
      trustedIPs: []
      insecure: false
    transport:
      respondingTimeouts:
        readTimeout:
        writeTimeout:
        idleTimeout:
      lifeCycle:
        requestAcceptGraceTimeout:
        graceTimeOut:
      keepAliveMaxRequests:
      keepAliveMaxTime:
    observability:
      metrics:
      accessLogs:
      tracing:
      traceVerbosity:
  metrics:
    port: 9101
    expose:
      default: false
    exposedPort: 9101
    protocol: TCP
    observability:
      metrics:
      accessLogs:
      tracing:
      traceVerbosity:

tlsOptions: {}
tlsStore: {}

# <-- CHANGED: LoadBalancer не нужен при hostNetwork+bind на IP ноды.
# Оставляем ClusterIP чтобы внутрикластерные ingress ресурсы могли получить publishedService
# для поля status.loadBalancer (нужно для external-dns и т.п.). Если совсем не нужно — поставь service.enabled: false.
service:
  enabled: true
  single: true
  type: ClusterIP
  annotations: {}
  annotationsTCP: {}
  annotationsUDP: {}
  labels: {}
  spec: {}
  loadBalancerSourceRanges: []
  externalIPs: []
  additionalServices: {}

autoscaling:
  enabled: false
  minReplicas:
  maxReplicas:
  metrics: []
  behavior: {}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: "{{ template \"traefik.fullname\" . }}"

persistence:
  enabled: false
  name: data
  existingClaim: ""
  accessMode: ReadWriteOnce
  size: 128Mi
  storageClass:
  volumeName: ""
  path: /data
  annotations: {}
  subPath: ""

certificatesResolvers: {}

hostNetwork: true

rbac:
  enabled: true
  namespaced: false
  aggregateTo: []

podSecurityPolicy:
  enabled: false

serviceAccount:
  name: ""

serviceAccountAnnotations: {}

resources: {}

# <-- CHANGED: pin'им DaemonSet только на ноды, для которых есть маппинг в
# configmap node-external-ips. На других нодах wrapper упадёт с "no IP mapping".

nodeSelector: {}

topologySpreadConstraints: []

priorityClassName: ""

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]
    add: ["NET_BIND_SERVICE"]
  readOnlyRootFilesystem: true

podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  runAsNonRoot: false

extraObjects: 
  - apiVersion: v1
    kind: Secret
    metadata:
      name: secret-auth
    type: Opaque
    stringData:
      # Generate a new password using: htpasswd -nb yourusername yourpassword
      # Or bcrypt (recommended): htpasswd -nB yourusername yourpassword
      # Below is the default for admin:admin
      admin: "nl2k0DfSAv]2"
  - apiVersion: v1
    kind: Secret
    metadata:
      name: traefik-auth
    type: Opaque
    stringData:
      # Generate a new password using: htpasswd -nb yourusername yourpassword
      # Or bcrypt (recommended): htpasswd -nB yourusername yourpassword
      # Below is the default for admin:admin
      users: |
        admin:$apr1$7B82uM1r$7nUyrhJeNm5G6bo8aotTD0
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: traefik-auth-middleware
    spec:
      basicAuth:
        secret: traefik-auth
  - apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      name: dashboard-redirect
    spec:
      redirectRegex:
        regex: "^https?://([^/]+)/?$"
        replacement: "https://${1}/dashboard/"
  - apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: traefik-dashboard-cert
    spec:
      secretName: traefik-tls
      issuerRef:
        name: letsencrypt
        kind: ClusterIssuer
      dnsNames:
      - ingress.mgaru.dev


