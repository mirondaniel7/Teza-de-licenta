# Default values for Traefik (adapted for per-node IP binding via wrapper-script in command)
# Patched for Ivan's setup: DaemonSet on cdp-worker-01/02, hostNetwork, bind to node's public IP

image:
  registry: docker.io
  repository: traefik
  tag:
  pullPolicy: IfNotPresent

commonLabels: {}

deployment:
  enabled: true
  kind: DaemonSet
  replicas: 1
  revisionHistoryLimit:
  terminationGracePeriodSeconds: 60
  minReadySeconds: 0
  healthchecksPort:
  healthchecksHost: ""
  healthchecksScheme:
  readinessPath: ""
  livenessPath: ""
  annotations: 
    reloader.stakater.com/auto: "true"
  labels: {}
  podAnnotations: {}
  podLabels: {}
  additionalContainers: []

  # <-- CHANGED: оставляем только node-ips, убираем shared-args и initContainer с get-node-ip.
  # Wrapper-скрипт в command сам читает /etc/node-ips/<node>.ipv4 и подставляет в аргументы.
  additionalVolumes:
    - name: node-ips
      configMap:
        name: node-external-ips

  # <-- CHANGED: initContainers больше не нужны
  initContainers: []

  shareProcessNamespace: false
  dnsPolicy: ""
  dnsConfig: {}
  hostAliases: []
  imagePullSecrets: []
  lifecycle: {}
  runtimeClassName: ""
  goMemLimitPercentage: 0.9

podDisruptionBudget:
  enabled: false
  maxUnavailable:
  minAvailable:

ingressClass:
  enabled: true
  isDefaultClass: true
  name: ""

core:
  defaultRuleSyntax: ""

experimental:
  abortOnPluginFailure: false
  fastProxy:
    enabled: false
    debug: false
  kubernetesGateway:
    enabled: false
  plugins: {}
  localPlugins: {}
  otlpLogs: false
  knative: false

# <-- CHANGED: Gateway API выключен (не используем)
gateway:
  enabled: false
  name: ""
  namespace: ""
  annotations: {}
  infrastructure: {}
  defaultScope: null
  listeners:
    web:
      port: 8000
      hostname: ""
      protocol: HTTP
      namespacePolicy:

gatewayClass:
  enabled: false
  name: ""
  labels: {}

api:
  dashboard: true
  insecure:
  debug:
  basePath: ""

ingressRoute:
  dashboard:
    # -- Create an IngressRoute for the dashboard
    enabled: true
    # -- Additional ingressRoute annotations (e.g. for kubernetes.io/ingress.class)
    annotations: 
      cert-manager.io/cluster-issuer: letsencrypt
    # -- Additional ingressRoute labels (e.g. for filtering IngressRoute by custom labels)
    labels: {}
    # -- The router match rule used for the dashboard ingressRoute
    matchRule: Host(`ingress.mgaru.dev`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`) || Path(`/`))
    # -- The internal service used for the dashboard ingressRoute
    # @default -- api@internal
    services:
      - name: api@internal
        kind: TraefikService
    # -- Specify the allowed entrypoints to use for the dashboard ingress route, (e.g. traefik, web, websecure).
    # By default, it's using traefik entrypoint, which is not exposed.
    # /!\ Do not expose your dashboard without any protection over the internet /!\
    entryPoints: ["websecure"]
    # -- Additional ingressRoute middlewares (e.g. for authentication)
    middlewares:
      - name: dashboard-redirect
      - name: traefik-auth-middleware
    # -- TLS options (e.g. secret containing certificate)
    tls:
      secretName: traefik-tls # Adjust this secret name if you have a specific cert for traefik.mgaru.dev
  healthcheck:
    # -- Create an IngressRoute for the healthcheck probe
    enabled: false
    # -- Additional ingressRoute annotations (e.g. for kubernetes.io/ingress.class)
    annotations: {}
    # -- Additional ingressRoute labels (e.g. for filtering IngressRoute by custom labels)
    labels: {}
    # -- The router match rule used for the healthcheck ingressRoute
    matchRule: PathPrefix(`/ping`)
    # -- The internal service used for the healthcheck ingressRoute
    # @default -- ping@internal
    services:
      - name: ping@internal
        kind: TraefikService
    # -- Specify the allowed entrypoints to use for the healthcheck ingress route, (e.g. traefik, web, websecure).
    # By default, it's using traefik entrypoint, which is not exposed.
    entryPoints: ["traefik"]
    # -- Additional ingressRoute middlewares (e.g. for authentication)
    middlewares: []
    # -- TLS options (e.g. secret containing certificate)
    tls: {}

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1
    maxSurge:

readinessProbe:
  failureThreshold: 1
  initialDelaySeconds: 2
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 2
livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 2
  periodSeconds: 10
  successThreshold: 1
  timeoutSeconds: 2

startupProbe: {}

providers:
  kubernetesCRD:
    enabled: true
    allowCrossNamespace: false
    allowExternalNameServices: false
    allowEmptyServices: true
    ingressClass: ""
    labelSelector: ""
    namespaces: []
    nativeLBByDefault: false

  kubernetesIngress:
    enabled: true
    allowExternalNameServices: false
    allowEmptyServices: true
    disableIngressClassLookup: false
    ingressClass:
    labelSelector:
    namespaces: []
    publishedService:
      enabled: true
      pathOverride: ""
    nativeLBByDefault: false
    strictPrefixMatching: false

  kubernetesGateway:
    enabled: false
    experimentalChannel: false
    namespaces: []
    labelSelector: ""
    nativeLBByDefault: false
    statusAddress:
      ip: ""
      hostname: ""
      service:
        enabled: true
        name: ""
        namespace: ""

  file:
    enabled: false
    watch: true
    content: ""

  kubernetesIngressNginx:
    enabled: false
    controllerClass: "k8s.io/ingress-nginx"
    ingressClass: "nginx"
    ingressClassByName: false
    watchIngressWithoutClass: false
    watchNamespace: ""
