apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: online-boutique
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: online-boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: mirondaniel7/ollama-custom:latest
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_VULKAN
              value: "1"
            - name: OLLAMA_GPU_OVERHEAD
              value: "0"
            - name: OLLAMA_NUM_PARALLEL
              value: "4"
            - name: OLLAMA_LOAD_TIMEOUT
              value: "5m0s"
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          livenessProbe:
            exec:
              command: ["sh", "-c", "ollama list > /dev/null 2>&1 || exit 1"]
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            exec:
              command: ["sh", "-c", "ollama list > /dev/null 2>&1 || exit 1"]
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: ollama-data
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: online-boutique
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-inference
  namespace: online-boutique
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-inference
  template:
    metadata:
      labels:
        app: ai-inference
    spec:
      containers:
        - name: ai-inference
          image: mirondaniel7/ollama-connect:latest
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_URL
              value: "http://ollama:11434"
            - name: OLLAMA_MODEL
              value: "llama3.1"
            - name: OLLAMA_MAX_TOKENS
              value: "4096"
            - name: OLLAMA_TIMEOUT
              value: "180"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-inference
  namespace: online-boutique
spec:
  selector:
    app: ai-inference
  ports:
    - port: 8000
      targetPort: 8000
